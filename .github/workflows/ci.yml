name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-14
    timeout-minutes: 20
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer
    steps:
      - uses: actions/checkout@v7
      - name: Toolchain
        run: |
          swift --version
          xcodebuild -version
      - name: Tests
        run: swift test
      - name: Strict release build
        run: swift build -c release -Xswiftc -warnings-as-errors
