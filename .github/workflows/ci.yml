name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: |
          swift --version
          xcodebuild -version
      - name: Tests
        run: swift test
      - name: Strict release build
        run: swift build -c release -Xswiftc -warnings-as-errors

